<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Conflito de Interesse — Sentinela RJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .ci-header {
      padding: 1rem max(2rem, calc((100% - 1200px) / 2 + 2rem));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-link { color: var(--muted); text-decoration: none; font-size: 0.875rem; }
    .back-link:hover { color: var(--text); }
    .ci-brand { font-weight: 700; font-size: 1rem; letter-spacing: -0.02em; }
    .ci-intro { color: var(--muted); font-size: 0.85rem; max-width: 70ch; margin-bottom: 1.5rem; }
    .ci-filtros { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .ci-filtros select {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.4rem 0.6rem; border-radius: 6px; font-family: inherit; font-size: 0.85rem;
    }
    .ci-resumo-chip {
      font-size: 0.78rem; color: var(--muted); background: var(--surface);
      border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px;
    }
    .ci-resumo-chip strong { color: var(--text); }
    .ci-empty {
      color: var(--muted); font-size: 0.875rem; padding: 2.5rem; text-align: center;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    }
    .fornecedor-link { color: var(--blue); text-decoration: none; font-size: 0.8rem; }
    .fornecedor-link:hover { text-decoration: underline; }

    /* Tabela enxuta de propósito: só as colunas que cabem sem quebrar o
       layout de 1200px do app (mesmo princípio da tabela de /alertas). Os
       sinais extras (matrícula, unidade, entrada na sociedade, faixa etária,
       1ª competência) e a triagem em si vivem no painel lateral — mesmo
       padrão de #detail-panel usado pela tabela de alertas. */
    .ci-detalhe-btn {
      background: #262626; border: 1px solid var(--border); color: var(--text);
      padding: 0.3rem 0.7rem; border-radius: 6px; font-family: inherit; font-size: 0.78rem;
      cursor: pointer;
    }
    .ci-detalhe-btn:hover { background: #333; }

    .ci-detalhe-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem 1.2rem;
      margin: 1.25rem 0; font-size: 0.85rem;
    }
    .ci-detalhe-grid dt { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.15rem; }
    .ci-detalhe-grid dd { color: var(--text); }

    .ci-acao-form { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
    .ci-acao-form select, .ci-acao-form input {
      background: #1a1a1a; border: 1px solid var(--border); color: var(--text);
      padding: 0.4rem 0.5rem; border-radius: 4px; font-family: inherit; font-size: 0.8rem;
    }
    .ci-acao-form input[type="text"] { flex: 1; min-width: 160px; }
    .ci-motivo-wrap { display: none; width: 100%; margin-top: 0.5rem; }
    .ci-motivo-wrap.show { display: flex; gap: 0.4rem; }
    .ci-erro { color: var(--red); font-size: 0.78rem; display: none; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header class="ci-header">
    <a href="/dashboard" class="back-link">← Voltar ao Sentinela RJ</a>
    <span class="ci-brand">Sentinela RJ</span>
  </header>

  <main>
    <h1 style="font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.5rem">
      Conflito de Interesse
    </h1>
    <p class="ci-intro">
      Sócios de empresas contratadas cujo nome coincide com o de um servidor público ativo
      (match por nome, sem CPF — sempre exige confirmação manual antes de virar caso).
    </p>

    <div id="ci-resumo" class="ci-filtros"></div>

    <div class="ci-filtros">
      <label for="ci-status-filtro" style="font-size:0.8rem;color:var(--muted)">Status:</label>
      <select id="ci-status-filtro">
        <option value="aberto">Aberto</option>
        <option value="investigando">Investigando</option>
        <option value="confirmado">Confirmado</option>
        <option value="descartado">Descartado</option>
        <option value="todos">Todos</option>
      </select>
    </div>

    <div id="ci-loading" class="loading-msg">Carregando candidatos…</div>
    <div id="ci-content" style="display:none"></div>
  </main>

  <div id="detail-backdrop" onclick="fecharDetalhe()"></div>
  <div id="detail-panel">
    <button id="detail-close" onclick="fecharDetalhe()">✕</button>
    <div id="detail-content"></div>
  </div>

  <script>
    'use strict';

    const CSRF_TOKEN = document.querySelector('meta[name="csrf-token"]').content;

    const STATUS_LABELS = {
      aberto: 'Aberto', investigando: 'Investigando',
      confirmado: 'Confirmado', descartado: 'Descartado',
    };
    const STATUS_BADGE = {
      aberto: 'gray', investigando: 'yellow', confirmado: 'red', descartado: 'green',
    };

    let MOTIVOS_DESCARTE = [];
    let ITENS_ATUAIS = [];

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = String(iso).slice(0, 10).split('-');
      if (d.length !== 3) return iso;
      return `${d[2]}/${d[1]}/${d[0]}`;
    }

    function formatCNPJ(ni) {
      if (!ni) return '—';
      const d = String(ni).replace(/\D/g, '');
      if (d.length !== 14) return ni;
      return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8,12)}-${d.slice(12,14)}`;
    }

    function statusBadge(status) {
      const cls = STATUS_BADGE[status] || 'gray';
      const label = STATUS_LABELS[status] || status;
      return `<span class="badge badge-${cls}">${escapeHtml(label)}</span>`;
    }

    async function carregar() {
      const status = document.getElementById('ci-status-filtro').value;
      const loading = document.getElementById('ci-loading');
      const content = document.getElementById('ci-content');
      loading.style.display = 'block';
      content.style.display = 'none';

      try {
        const res = await fetch(`/api/conflitos-interesse?status=${encodeURIComponent(status)}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || res.statusText);
        }
        const d = await res.json();
        MOTIVOS_DESCARTE = d.motivos_descarte || [];
        ITENS_ATUAIS = d.items || [];
        renderResumo(d.resumo);
        renderTabela(ITENS_ATUAIS);
        loading.style.display = 'none';
        content.style.display = 'block';
      } catch (e) {
        loading.textContent = `Erro ao carregar: ${e.message}`;
      }
    }

    function renderResumo(resumo) {
      const el = document.getElementById('ci-resumo');
      if (!resumo) { el.innerHTML = ''; return; }
      const ordem = ['aberto', 'investigando', 'confirmado', 'descartado'];
      el.innerHTML = ordem.map(st => `
        <span class="ci-resumo-chip">${STATUS_LABELS[st]}: <strong>${resumo[st] ?? 0}</strong></span>
      `).join('');
    }

    function renderTabela(items) {
      const content = document.getElementById('ci-content');
      if (!items || !items.length) {
        content.innerHTML = '<div class="ci-empty">Nenhum candidato encontrado para este filtro.</div>';
        return;
      }

      const rows = items.map(c => `
        <tr>
          <td style="font-size:0.8rem;color:#d4d4d4">${escapeHtml(c.nome_socio || '—')}</td>
          <td>
            <a href="/fornecedor/${escapeHtml(c.fornecedor_ni)}" class="fornecedor-link">
              ${formatCNPJ(c.fornecedor_ni)}
            </a>
          </td>
          <td style="font-size:0.8rem;color:#d4d4d4">
            ${escapeHtml(c.nome_servidor || '—')}
            <div style="font-size:0.7rem;color:var(--muted)">matrícula ${escapeHtml(c.matricula_servidor || '—')}</div>
          </td>
          <td style="white-space:nowrap">${(c.score_similaridade ?? 0).toFixed(1)}</td>
          <td>${statusBadge(c.status)}</td>
          <td><button type="button" class="ci-detalhe-btn" onclick="abrirDetalhe(${c.id})">Detalhes</button></td>
        </tr>`
      ).join('');

      content.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Sócio</th>
                <th>Fornecedor</th>
                <th>Servidor</th>
                <th>Score</th>
                <th>Status</th>
                <th>Detalhes</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    window.abrirDetalhe = function(id) {
      const c = ITENS_ATUAIS.find(i => i.id === id);
      if (!c) return;

      const transicoes = c.transicoes_permitidas || [];
      const opts = transicoes.map(st =>
        `<option value="${st}">${STATUS_LABELS[st] || st}</option>`
      ).join('');
      const motivoOpts = MOTIVOS_DESCARTE.map(m =>
        `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`
      ).join('');

      const acaoHtml = transicoes.length
        ? `
          <div class="ci-acao-form">
            <select id="ci-status-${c.id}" onchange="toggleMotivo(${c.id})">
              <option value="">Mudar status…</option>
              ${opts}
            </select>
            <button type="button" class="btn-page" onclick="salvarStatus(${c.id})">Salvar</button>
            <div class="ci-acao-form ci-motivo-wrap" id="ci-motivo-wrap-${c.id}">
              <select id="ci-motivo-${c.id}">
                <option value="">Motivo do descarte…</option>
                ${motivoOpts}
              </select>
            </div>
            <input type="text" id="ci-nota-${c.id}" placeholder="Nota (opcional)">
          </div>
          <div class="ci-erro" id="ci-erro-${c.id}"></div>`
        : '<p style="color:var(--muted);font-size:0.8rem;margin-top:1rem">Sem transições disponíveis neste status.</p>';

      document.getElementById('detail-content').innerHTML = `
        <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:0.25rem">${escapeHtml(c.nome_socio || '—')}</h2>
        <p style="color:var(--muted);font-size:0.8rem;margin-bottom:0.5rem">${escapeHtml(c.qualificacao_socio || '—')}</p>
        ${statusBadge(c.status)}
        <dl class="ci-detalhe-grid">
          <div><dt>Fornecedor</dt><dd><a href="/fornecedor/${escapeHtml(c.fornecedor_ni)}" class="fornecedor-link">${formatCNPJ(c.fornecedor_ni)}</a></dd></div>
          <div><dt>Score</dt><dd>${(c.score_similaridade ?? 0).toFixed(1)}</dd></div>
          <div><dt>Servidor</dt><dd>${escapeHtml(c.nome_servidor || '—')}</dd></div>
          <div><dt>Matrícula</dt><dd>${escapeHtml(c.matricula_servidor || '—')}</dd></div>
          <div><dt>Unidade</dt><dd>${escapeHtml(c.sigla_ua || '—')}</dd></div>
          <div><dt>Entrada na sociedade</dt><dd>${formatDate(c.data_entrada_sociedade)}</dd></div>
          <div><dt>Faixa etária do sócio</dt><dd>${escapeHtml(c.faixa_etaria_socio || '—')}</dd></div>
          <div><dt>1ª competência como servidor</dt><dd>${formatDate(c.primeira_competencia_servidor)}</dd></div>
        </dl>
        ${acaoHtml}`;

      document.getElementById('detail-backdrop').classList.add('backdrop-open');
      document.getElementById('detail-panel').classList.add('panel-open');
    };

    window.fecharDetalhe = function() {
      document.getElementById('detail-backdrop').classList.remove('backdrop-open');
      document.getElementById('detail-panel').classList.remove('panel-open');
    };

    window.toggleMotivo = function(id) {
      const sel = document.getElementById(`ci-status-${id}`);
      const wrap = document.getElementById(`ci-motivo-wrap-${id}`);
      wrap.classList.toggle('show', sel.value === 'descartado');
    };

    window.salvarStatus = async function(id) {
      const statusEl = document.getElementById(`ci-status-${id}`);
      const motivoEl = document.getElementById(`ci-motivo-${id}`);
      const notaEl = document.getElementById(`ci-nota-${id}`);
      const erroEl = document.getElementById(`ci-erro-${id}`);
      erroEl.style.display = 'none';

      const status = statusEl.value;
      if (!status) {
        erroEl.textContent = 'Selecione um status.';
        erroEl.style.display = 'block';
        return;
      }
      const body = { status, nota: notaEl.value.trim() };
      if (status === 'descartado') {
        body.motivo_descarte = motivoEl.value;
      }

      try {
        const res = await fetch(`/conflitos-interesse/${id}/status`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': CSRF_TOKEN,
          },
          body: JSON.stringify(body),
        });
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.error || res.statusText);
        fecharDetalhe();
        carregar();
      } catch (e) {
        erroEl.textContent = e.message;
        erroEl.style.display = 'block';
      }
    };

    document.getElementById('ci-status-filtro').addEventListener('change', carregar);
    carregar();
  </script>
</body>
</html>
